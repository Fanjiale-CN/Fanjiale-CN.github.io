<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galok</title>
<style>
body{margin:0;background:#f2efe9;font-family:-apple-system;color:#555}

.nav{
position:fixed;
top:30px;
left:40px;
font-size:13px;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:#8a8a8a;
}

header{
padding:100px 20px 20px;
text-align:center;
}

h1{
font-weight:300;
letter-spacing:8px;
color:#6b6b6b;
}

.gallery{
max-width:1000px;
margin:60px auto;
padding:0 24px;
display:grid;
gap:80px;
}

.card{
opacity:0;
transform:translateY(40px);
transition:1.3s ease;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card img{
width:100%;
border-radius:3px;
box-shadow:0 20px 40px rgba(120,110,100,0.08);
cursor:pointer;
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.viewer img{
max-width:90%;
max-height:90%;
}

</style>
</head>
<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="about.html">About</a>
</div>

<header>
<h1>GALOK</h1>
</header>

<section class="gallery">

<div class="card"><img src="images/1.jpg"></div>
<div class="card"><img src="images/2.jpg"></div>
<div class="card"><img src="images/3.jpg"></div>
<div class="card"><img src="images/4.jpg"></div>
<div class="card"><img src="images/5.jpg"></div>
<div class="card"><img src="images/6.jpg"></div>
<div class="card"><img src="images/7.jpg"></div>

</section>

<div class="viewer" id="viewer">
<img id="viewer-img">
</div>

<script>

const cards=document.querySelectorAll('.card');

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});

cards.forEach(card=>observer.observe(card));

const viewer=document.getElementById('viewer');
const viewerImg=document.getElementById('viewer-img');

cards.forEach(card=>{
card.addEventListener('click',()=>{
viewer.style.display='flex';
viewerImg.src=card.querySelector('img').src;
});
});

viewer.addEventListener('click',()=>{
viewer.style.display='none';
});

</script>

</body>
</html>
