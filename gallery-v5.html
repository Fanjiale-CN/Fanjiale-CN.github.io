<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galok</title>
<style>

body{
margin:0;
background:#f3efe8;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue";
color:#555;
}

.nav{
position:fixed;
top:30px;
left:40px;
font-size:13px;
letter-spacing:1px;
z-index:10;
}

.nav a{
margin-right:24px;
text-decoration:none;
color:#8c8c8c;
transition:0.4s ease;
}

.nav a:hover{
opacity:0.5;
}

header{
padding:120px 20px 60px;
text-align:center;
animation:fadeUp 1.6s ease;
}

h1{
font-weight:300;
letter-spacing:10px;
color:#6e6e6e;
}

.subtitle{
margin-top:12px;
color:#a3a3a3;
}

.gallery{
max-width:1200px;
margin:0 auto;
padding:0 40px 120px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:60px;
}

.card{
opacity:0;
transform:translateY(60px);
transition:1.5s ease;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card img{
width:100%;
border-radius:4px;
box-shadow:0 25px 50px rgba(120,110,100,0.08);
transition:1.2s ease;
}

.card img:hover{
transform:scale(1.03);
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.viewer img{
max-width:88%;
max-height:88%;
animation:fadeIn 0.6s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@media (max-width:900px){
.gallery{
grid-template-columns:1fr;
padding:0 20px 80px;
}
}

</style>
</head>
<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="gallery-v5.html">Gallery</a>
<a href="about.html">About</a>
</div>

<header>
<h1>GALOK</h1>
<div class="subtitle">Quiet · Light · Memory</div>
</header>

<section class="gallery">

<div class="card"><img src="images/1.jpg"></div>
<div class="card"><img src="images/2.jpg"></div>
<div class="card"><img src="images/3.jpg"></div>
<div class="card"><img src="images/4.jpg"></div>
<div class="card"><img src="images/5.jpg"></div>
<div class="card"><img src="images/6.jpg"></div>
<div class="card"><img src="images/7.jpg"></div>

</section>

<div class="viewer" id="viewer">
<img id="viewer-img">
</div>

<script>

const cards=document.querySelectorAll('.card');

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});

cards.forEach(card=>observer.observe(card));

const viewer=document.getElementById('viewer');
const viewerImg=document.getElementById('viewer-img');

cards.forEach(card=>{
card.addEventListener('click',()=>{
viewer.style.display='flex';
viewerImg.src=card.querySelector('img').src;
});
});

viewer.addEventListener('click',()=>{
viewer.style.display='none';
});

</script>

</body>
</html>
