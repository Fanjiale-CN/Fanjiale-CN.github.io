<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galok - Photography</title>
<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue";
background:#f2efe9;
color:#4a4a4a;
}

header{
padding:90px 20px 40px;
text-align:center;
}

h1{
font-weight:300;
letter-spacing:10px;
font-size:34px;
color:#6b6b6b;
}

.subtitle{
margin-top:10px;
color:#9b9b9b;
letter-spacing:2px;
}

.gallery{
max-width:1000px;
margin:60px auto;
display:grid;
grid-template-columns:1fr;
gap:80px;
padding:0 24px;
}

.card{
opacity:0;
transform:translateY(40px);
transition:all 1.4s ease;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card img{
width:100%;
border-radius:4px;
box-shadow:0 20px 40px rgba(120,110,100,0.08);
transition:0.8s ease;
}

.card img:hover{
transform:scale(1.02);
}

footer{
text-align:center;
padding:100px 0;
color:#9c9c9c;
font-size:13px;
}

</style>
</head>
<body>

<header>
<h1>GALOK</h1>
<div class="subtitle">Quiet · Light · Memory</div>
</header>

<section class="gallery">

<div class="card"><img src="images/1.jpg"></div>
<div class="card"><img src="images/2.jpg"></div>
<div class="card"><img src="images/3.jpg"></div>
<div class="card"><img src="images/4.jpg"></div>
<div class="card"><img src="images/5.jpg"></div>
<div class="card"><img src="images/6.jpg"></div>
<div class="card"><img src="images/7.jpg"></div>

</section>

<footer>
© Galok · Fan Jiale
</footer>

<script>

const cards=document.querySelectorAll('.card');

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});

cards.forEach(card=>observer.observe(card));

</script>

</body>
</html>
