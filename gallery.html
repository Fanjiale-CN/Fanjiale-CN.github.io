<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galok - Photography</title>
<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue";
background:#f4f6f8;
color:#333;
}
header{
padding:60px 20px;
text-align:center;
background:linear-gradient(180deg,#e6edf4,#f7f9fb);
}
h1{
font-weight:300;
letter-spacing:6px;
font-size:36px;
}
.subtitle{
margin-top:10px;
color:#7a8a9a;
}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:40px;
}
.card{
overflow:hidden;
border-radius:12px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
transition:0.3s;
}
.card:hover{
transform:translateY(-6px);
}
.card img{
width:100%;
display:block;
}
footer{
text-align:center;
padding:40px;
color:#999;
font-size:14px;
}
</style>
</head>
<body>
<header>
<h1>GALOK</h1>
<div class="subtitle">Monet Color · Personal Photography</div>
</header>

<section class="gallery">

<div class="card"><img src="images/1.jpg"></div>
<div class="card"><img src="images/2.jpg"></div>
<div class="card"><img src="images/3.jpg"></div>
<div class="card"><img src="images/4.jpg"></div>
<div class="card"><img src="images/5.jpg"></div>
<div class="card"><img src="images/6.jpg"></div>
<div class="card"><img src="images/7.jpg"></div>

</section>

<footer>
© Galok · 范嘉乐
</footer>

</body>
</html>
