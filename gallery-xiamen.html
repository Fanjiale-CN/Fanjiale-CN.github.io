<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galok — Xiamen</title>
<style>
body{
background:#f5f3ef;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue";
margin:0;
color:#333;
}

.header{
padding:80px 20px 40px;
text-align:center;
}

.title{
font-size:32px;
letter-spacing:2px;
margin-bottom:10px;
}

.subtitle{
color:#888;
font-size:14px;
}

.gallery{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:20px;
}

.image{
opacity:0;
transform:translateY(30px);
animation:fade 1.2s forwards;
}

.image img{
width:100%;
border-radius:6px;
transition:.6s ease;
}

.image img:hover{
transform:scale(1.02);
}

@keyframes fade{
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:800px){
.gallery{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="header">
<div class="title">Xiamen</div>
<div class="subtitle">Summer · Quiet Coast</div>
</div>

<div class="gallery">

<div class="image"><img src="images/IMG_2442.jpeg"></div>
<div class="image"><img src="images/IMG_2443.jpeg"></div>
<div class="image"><img src="images/IMG_2464.jpeg"></div>
<div class="image"><img src="images/IMG_2488.jpeg"></div>
<div class="image"><img src="images/IMG_2489.jpeg"></div>

</div>

</body>
</html>
