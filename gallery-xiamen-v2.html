<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galok — Xiamen</title>
  <style>
.ios-lightbox { pointer-events: auto; }
.ios-lightbox-close { z-index: 10001; }
.ios-lightbox-img { z-index: 10000; }
    /* ===== Anti-save hardening (mobile/iOS) ===== */
    html, body, img, .card, .ios-lightbox, .ios-lightbox-img {
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
      -webkit-user-drag: none !important;
    }

    body {
      background: #f5f3ef;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0;
      color: #333;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .header {
      padding: 80px 20px 40px;
      text-align: center;
    }

    .title {
      font-size: 32px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
    }

    .gallery {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      padding: 20px;
    }

    .card {
      position: relative;
      opacity: 0;
      transform: translateY(30px);
      animation: fade 1.2s forwards;
      cursor: zoom-in;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      border-radius: 6px;
    }

    .card img {
      width: 100%;
      display: block;
      border-radius: 6px;
      transition: 0.6s ease;
      pointer-events: none !important; /* 触摸不直接命中图片本体 */
    }

    .card::after {
      content: "© Galok";
      position: absolute;
      right: 12px;
      bottom: 10px;
      color: rgba(255, 255, 255, 0.58);
      font-size: 12px;
      letter-spacing: 0.5px;
      z-index: 2;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    .caption {
      margin-top: 12px;
      color: #777;
      font-size: 13px;
      line-height: 1.6;
    }

    @keyframes fade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 800px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

    /* ===== iOS-like tap zoom preview ===== */
    .ios-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0px);
      transition: background 0.28s ease, backdrop-filter 0.28s ease;
      overflow: hidden;
    }

    .ios-lightbox.show {
      display: flex;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(6px);
    }

    .ios-lightbox-img {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      transform: translate3d(0, 20px, 0) scale(0.92);
      opacity: 0;
      transition: transform 0.34s cubic-bezier(0.22, 0.8, 0.24, 1), opacity 0.24s ease;
      will-change: transform, opacity;
      pointer-events: none;
    }

    .ios-lightbox.show .ios-lightbox-img {
      transform: translate3d(0, 0, 0) scale(1);
      opacity: 1;
    }

    .ios-lightbox-close {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      right: max(14px, env(safe-area-inset-right));
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 22px;
      line-height: 34px;
      text-align: center;
      backdrop-filter: blur(8px);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Xiamen</div>
    <div class="subtitle">Summer · Quiet Coast</div>
  </div>

  <div class="gallery">
    <div class="card">
      <img src="images/IMG_2442.jpeg" alt="港口与海风之间，时间变得缓慢。" />
      <div class="caption">港口与海风之间，时间变得缓慢。</div>
    </div>

    <div class="card">
      <img src="images/IMG_2443.jpeg" alt="山海之间，厦门有一种安静的节奏。" />
      <div class="caption">山海之间，厦门有一种安静的节奏。</div>
    </div>

    <div class="card">
      <img src="images/IMG_2464.jpeg" alt="远处的城市线条，在夏日空气中变得柔和。" />
      <div class="caption">远处的城市线条，在夏日空气中变得柔和。</div>
    </div>

    <div class="card">
      <img src="images/IMG_2488.jpeg" alt="日落落在海面，像一层温柔的滤镜。" />
      <div class="caption">日落落在海面，像一层温柔的滤镜。</div>
    </div>

    <div class="card">
      <img src="images/IMG_2489.jpeg" alt="棕榈树与海岸，是厦门最安静的夏天。" />
      <div class="caption">棕榈树与海岸，是厦门最安静的夏天。</div>
    </div>
  </div>

  <!-- iOS-like lightbox -->
  <div class="ios-lightbox" id="iosLightbox" aria-hidden="true">
    <button class="ios-lightbox-close" id="iosLightboxClose" aria-label="Close">×</button>
    <img class="ios-lightbox-img" id="iosLightboxImg" alt="preview" />
  </div>

  <script>
    (() => {
      const prevent = (e) => e.preventDefault();

      // 全局防菜单/防选择/防拖拽/防手势菜单
      ['contextmenu', 'selectstart', 'dragstart', 'gesturestart'].forEach((evt) => {
        document.addEventListener(evt, prevent, { passive: false, capture: true });
      });

      // 长按拦截（尽量抑制 iOS/Android 长按菜单）
      let timer = null;
      const start = (e) => {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => {
          e.preventDefault();
        }, 280);
      };
      const end = () => {
        if (timer) clearTimeout(timer);
        timer = null;
      };

      // 仅用于“尽量”抑制长按菜单：不再破坏滚动
document.addEventListener('touchstart', start, { passive: true, capture: true });
document.addEventListener('touchend', end, { passive: true, capture: true });
document.addEventListener('touchcancel', end, { passive: true, capture: true });

      // iOS 风格点按放大预览
      const lightbox = document.getElementById('iosLightbox');
      const lightboxImg = document.getElementById('iosLightboxImg');
      const closeBtn = document.getElementById('iosLightboxClose');

      const openPreview = (src, alt = '') => {
        lightboxImg.src = src;
        lightboxImg.alt = alt || 'preview';
        lightbox.classList.add('show');
        lightbox.setAttribute('aria-hidden', 'false');
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
      };

      const closePreview = () => {
        lightbox.classList.remove('show');
        lightbox.setAttribute('aria-hidden', 'true');
        setTimeout(() => {
          lightboxImg.src = '';
        }, 220);
        document.documentElement.style.overflow = '';
        document.body.style.overflow = '';
      };

      document.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const img = card.querySelector('img');
          if (img && img.src) {
            openPreview(img.src, img.alt || '');
          }
        }, { passive: false });
      });

      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closePreview();
      });

      closeBtn.addEventListener('click', closePreview);
// 用 pointerdown（比 click 更可靠），并 capture 抢到最前，保证一定能关闭
closeBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  e.stopPropagation();
  closePreview();
}, { passive: false, capture: true });

lightbox.addEventListener('pointerdown', (e) => {
  // 点到黑色背景才关闭
  if (e.target === lightbox) {
    e.preventDefault();
    closePreview();
  }
}, { passive: false, capture: true });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox.classList.contains('show')) {
          closePreview();
        }
      });

      // 预览层继续防长按菜单
['contextmenu', 'selectstart', 'dragstart', 'gesturestart'].forEach((evt) => {
  lightbox.addEventListener(evt, (e) => e.preventDefault(), { passive: false, capture: true });
});
